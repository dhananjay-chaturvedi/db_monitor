# Low thresholds for E2E alert triggering (applied on top of metrics_and_thresholds.ini)

[metric.gcp.monitoring.CloudSQL.cpu_utilization]
collect     = true
enabled     = true
warning     = 0.01
critical    = 0.02
window      = 1

[metric.gcp.monitoring.CloudSQL.memory_utilization]
collect     = true
enabled     = true
warning     = 0.01
critical    = 0.02
window      = 1

[metric.gcp.monitoring.CloudSQL.network_connections]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.gcp.monitoring.CloudSQL.disk_utilization]
collect     = true
enabled     = true
warning     = 0.01
critical    = 0.02
window      = 1

[metric.os.cpu_utilization]
enabled     = true
warning     = 0.01
critical    = 0.02
window      = 1

[metric.db.connection]
enabled     = true
warning     = 0
critical    = 1
window      = 1

# QI disabled for E2E speed (API can be slow)
[metric.gcp.qi.CloudSQL.execution_count]
collect     = false
enabled     = false
window      = 1
