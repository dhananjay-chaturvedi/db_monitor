# --- PI OS CPU breakdown (all disabled by default) ---

[metric.aws.pi.RDS.os_cpuUtilization_nice_avg]
collect     = false
enabled     = false
description = PI OS CPU nice (database engine CPU usage)
metric_name = os.cpuUtilization.nice.avg
operator    = >
unit        = %
window      = 3
warning     = 75
critical    = 90

[metric.aws.pi.RDS.os_cpuUtilization_total_avg]
collect     = false
enabled     = false
description = PI OS CPU total
metric_name = os.cpuUtilization.total.avg
operator    = >
unit        = %
window      = 3
warning     = 90
critical    = 95

[metric.aws.pi.RDS.os_cpuUtilization_wait_avg]
collect     = false
enabled     = false
description = PI OS CPU wait (I/O wait)
metric_name = os.cpuUtilization.wait.avg
operator    = >
unit        = %
window      = 3
warning     = 20
critical    = 40

[metric.aws.pi.RDS.os_cpuUtilization_idle_avg]
collect     = false
enabled     = false
description = PI OS CPU idle
metric_name = os.cpuUtilization.idle.avg
operator    = <
unit        = %
window      = 3
warning     = 10
critical    = 5

[metric.aws.pi.RDS.os_cpuUtilization_user_avg]
collect     = false
enabled     = false
description = PI OS CPU user
metric_name = os.cpuUtilization.user.avg
operator    = >
unit        = %
window      = 3
warning     = 75
critical    = 90

[metric.aws.pi.RDS.os_cpuUtilization_system_avg]
collect     = false
enabled     = false
description = PI OS CPU system (kernel)
metric_name = os.cpuUtilization.system.avg
operator    = >
unit        = %
window      = 3
warning     = 30
critical    = 50

[metric.aws.pi.RDS.os_cpuUtilization_steal_avg]
collect     = false
enabled     = false
description = PI OS CPU steal (hypervisor)
metric_name = os.cpuUtilization.steal.avg
operator    = >
unit        = %
window      = 3
warning     = 5
critical    = 15

[metric.aws.pi.RDS.os_cpuUtilization_irq_avg]
collect     = false
enabled     = false
description = PI OS CPU IRQ
metric_name = os.cpuUtilization.irq.avg
operator    = >
unit        = %
window      = 3
warning     = 5
critical    = 15

[metric.aws.pi.RDS.os_cpuUtilization_guest_avg]
collect     = false
enabled     = false
description = PI OS CPU guest
metric_name = os.cpuUtilization.guest.avg
operator    = >
unit        = %
window      = 3
warning     = 5
critical    = 15

