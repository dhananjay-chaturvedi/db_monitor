# Low thresholds for E2E alert triggering (applied on top of metrics_and_thresholds.ini)

[metric.aws.cloudwatch.RDS.CPUUtilization]
collect     = true
enabled     = true
warning     = 0.01
critical    = 0.02
window      = 1

[metric.aws.cloudwatch.RDS.FreeableMemory]
collect     = true
enabled     = true
warning     = 999999999999999
critical    = 999999999999999
window      = 1

[metric.aws.cloudwatch.RDS.DatabaseConnections]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.aws.cloudwatch.RDS.ConnectionAttempts]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.aws.cloudwatch.RDS.ReadLatency]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.aws.cloudwatch.RDS.WriteLatency]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.aws.cloudwatch.Aurora.Queries]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.aws.cloudwatch.Aurora.SelectLatency]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.aws.cloudwatch.Aurora.DMLLatency]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.aws.cloudwatch.Aurora.VolumeBytesUsed]
collect     = true
enabled     = true
warning     = 0
critical    = 0
window      = 1

[metric.os.cpu_utilization]
enabled     = true
warning     = 0.01
critical    = 0.02
window      = 1

[metric.db.connection]
enabled     = true
warning     = 0
critical    = 1
window      = 1

# PI disabled for E2E speed (PI API can hang minutes from this host; verified separately)
[metric.aws.pi.RDS.os_cpuUtilization_nice_avg]
collect     = false
enabled     = false
warning     = 0
critical    = 0
window      = 1
